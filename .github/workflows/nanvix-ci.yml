name: Nanvix CI

on:
  schedule:
    - cron: "0 12 * * *"
  push:
    branches: ["nanvix/**"]
  pull_request:
    branches: ["nanvix/**"]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v2.0.0
    with:
      zutil-version: "v0.8.2"
      docker-image: "ghcr.io/nanvix/toolchain-gcc@sha256:ea33e4cae4041dcf55f0ec49f58de90ae1b5e9fb7c3c507971b40975b14aecd3" # yamllint disable-line rule:line-length
      platforms: '["microvm"]'
      process-modes: '["multi-process","single-process","standalone"]'
      memory-sizes: '["256mb"]'
      windows-matrix-exclude: '[]'
      skip-full-test-modes: '["multi-process","single-process","standalone"]'
      caller-event-name: ${{ github.event_name }}
      windows-test: true
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

  ci-scheduled:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v2.0.0
    with:
      zutil-version: "v0.8.2"
      docker-image: "ghcr.io/nanvix/toolchain-gcc@sha256:ea33e4cae4041dcf55f0ec49f58de90ae1b5e9fb7c3c507971b40975b14aecd3" # yamllint disable-line rule:line-length
      platforms: '["microvm"]'
      process-modes: '["multi-process","single-process","standalone"]'
      memory-sizes: '["256mb"]'
      windows-matrix-exclude: '[]'
      skip-full-test-modes: '["multi-process","single-process","standalone"]'
      caller-event-name: 'schedule'
      windows-test: true
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
